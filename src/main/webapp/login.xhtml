<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <h:head>
        <f:facet name="first">
            <meta http-equiv="X-UA-Compatible" content="IE=edge" />
            <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
            <meta name="apple-mobile-web-app-capable" content="yes" />
        </f:facet>
        <title>Login</title>

        <style>
            /* Zera o fundo geral com um bordô quase negro */
            body.login-body {
                background-color: #1a030a !important;
            }

            /* O painel do formulário: Bordô profundo e imponente */
            .login-panel {
                background-color: #3b0918 !important;
                color: #f5eedc !important; /* Texto em bege */
            }

            /* Força títulos e subtítulos para o bege */
            .login-panel h1, 
            .login-panel h2, 
            .login-panel h3,
            .login-panel p, 
            .login-panel span {
                color: #f5eedc !important;
            }

            /* Inputs agressivos: Fundo vazado, borda bege, texto branco absoluto */
            body .ui-inputfield {
                background-color: transparent !important;
                color: #ffffff !important;
                border: 1px solid #f5eedc !important;
                border-radius: 0px !important; /* Cantos retos, sem frescura */
            }

            /* Borda branca e grossa ao focar no campo */
            body .ui-inputfield:focus {
                border: 2px solid #ffffff !important;
                box-shadow: none !important;
            }

            /* Ícones de usuário e senha na cor bege */
            .login-panel i {
                color: #f5eedc !important;
            }

            /* O Botão de Login: Fundo bege, texto bordô, caixa alta */
            body .ui-button {
                background-color: #f5eedc !important;
                border: none !important;
                color: #3b0918 !important;
                border-radius: 0px !important;
                text-transform: uppercase !important;
                font-weight: bold !important;
                letter-spacing: 2px !important;
            }

            /* Efeito ao passar o mouse: Branco absoluto */
            body .ui-button:hover {
                background-color: #ffffff !important;
                color: #000000 !important;
            }

            /* Injeção da sua imagem com a grade centralizada */
            .login-image {
                background-image: url('https://images.trvl-media.com/lodging/34000000/33070000/33062800/33062762/8de6acc5.jpg?impolicy=resizecrop&amp;rw=1200&amp;ra=fit') !important;
                background-size: cover !important;
                background-position: center !important;
                filter: contrast(110%) brightness(85%);
                width: 100%;
                height: 100%;
                min-height: 400px; /* Impede que a div suma em telas menores */
                display: block;
            }
        </style>
    </h:head>

    <h:body styleClass="login-body">
        <h:form id="CreateForm">
            <p:growl id="growl" showDetail="true" />
            <div class="grid grid-nogutter">
                <div class="col-12" style="text-align:center">
                    </div>
            </div>
            
            <div class="login-panel">
                <div class="grid">
                    <div class="col-12 lg:col-6 left-side" style="padding: 0;">
                        <div class="login-image"></div>
                    </div>
                    <div class="col-12 lg:col-6 right-side ui-fluid">
                        <div class="col-12 container">
                            <h3>LOGIN</h3>
                            <h2></h2>
                        </div>
                        <div class="col-12">
                            <div class="input-wrapper ui-input-icon-left">
                                <i class="pi pi-user"/>
                                <p:inputText id="email"  value="#{loginController.funcionario.email}" 
                                             autocomplete="off" 
                                             required="true" requiredMessage="O Email é obrigatório!" 
                                             placeholder="E-mail"/>                        
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="input-wrapper ui-input-icon-left">
                                <i class="pi pi-lock"/>                                
                                <p:password id="senha"  value="#{loginController.funcionario.senha}" 
                                             autocomplete="off" 
                                             required="true" requiredMessage="A senha é obrigatória!" 
                                             placeholder="Senha"/>
                            </div>
                        </div>
                        <div class="col-12 button-container">                            
                            <p:commandButton id="btnLogar" value="Acessar" update="@form"
                             action="#{loginController.validarLogin()}" />
                        </div>
                    </div>
                </div>
            </div>           
        </h:form>
    </h:body>

    <h:outputStylesheet name="css/primeicons.css" library="manhattan-layout"/>
    <h:outputStylesheet name="css/primeflex.min.css" library="manhattan-layout"/>
    <h:outputStylesheet name="css/layout-cyan-deeporange.css" library="manhattan-layout" />

</html>
