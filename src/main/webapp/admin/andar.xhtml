<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/template.xhtml">

    <ui:define name="title">
        <h:outputText value="Andares"/>
    </ui:define>

    <ui:define name="content">
        <h:form id="frmList">
            <h:panelGroup id="pngList">
                <p:growl id="growl" showDetail="true"/>

                <p:fieldset legend="Gerenciar Andares" toggleable="true">
                    <p:dataTable id="datalist"
                                 value="#{andarController.andarList}"
                                 var="item"
                                 selectionMode="single"
                                 selection="#{andarController.selected}"
                                 widgetVar="datalistAndarWidgetVar"
                                 rowKey="#{item.id}"
                                 paginator="true"
                                 rows="5"
                                 rowsPerPageTemplate="5,10,20"
                                 emptyMessage="Nenhum andar cadastrado.">

                        <p:ajax event="rowSelect"   update="btnEdit btnDelete btnView"/>
                        <p:ajax event="rowUnselect" update="btnEdit btnDelete btnView"/>


                        <p:column width="10%" sortBy="#{item.numero}" filterBy="#{item.numero}">
                            <f:facet name="header"><h:outputText value="Número"/></f:facet>
                            <h:outputText value="#{item.numero}º"/>
                        </p:column>

                        <p:column width="20%" sortBy="#{item.nome}" filterBy="#{item.nome}">
                            <f:facet name="header"><h:outputText value="Descrição"/></f:facet>
                            <h:outputText value="#{item.nome}"/>
                        </p:column>

                        <f:facet name="footer">
                            <p:commandButton id="btnCreate" value="Novo Andar" icon="pi pi-plus"
                                             actionListener="#{andarController.prepareAdicionar()}"
                                             update=":CreateFormAndar"
                                             oncomplete="PF('dlgCreateAndar').show()"/>

                            <p:commandButton id="btnEdit" icon="pi pi-pencil" value="Editar"
                                             update=":formEditAndar" oncomplete="PF('dlgEditAndar').show()"
                                             disabled="#{empty andarController.selected}"/>

                            <p:commandButton id="btnDelete" icon="pi pi-trash" value="Excluir"
                                             actionListener="#{andarController.deletarAndar()}"
                                             update=":frmList"
                                             disabled="#{empty andarController.selected}">
                                <p:confirm header="Confirmar Exclusão"
                                           message="Confirma a exclusão deste andar?"
                                           icon="ui-icon-alert"/>
                            </p:commandButton>

                            <p:commandButton id="btnView" icon="pi pi-eye" value="Detalhes"
                                             update=":formViewAndar" oncomplete="PF('dlgViewAndar').show()"
                                             disabled="#{empty andarController.selected}"/>
                        </f:facet>
                    </p:dataTable>
                </p:fieldset>

                <p:confirmDialog global="true" showEffect="fade" hideEffect="fade">
                    <p:commandButton value="Sim" type="button" styleClass="ui-confirmdialog-yes" icon="fa fa-check"/>
                    <p:commandButton value="Não" type="button" styleClass="ui-confirmdialog-no"  icon="fa fa-times"/>
                </p:confirmDialog>
            </h:panelGroup>
        </h:form>

        <!-- DIALOG: CRIAR ANDAR -->
        <p:dialog header="Novo Andar" widgetVar="dlgCreateAndar" height="320" width="520"
                  showEffect="fade" modal="true">
            <h:form id="CreateFormAndar">
                <p:growl id="growlCreate" showDetail="true"/>
                <h:panelGrid columns="2" cellpadding="6">

                    <p:outputLabel value="Número do Andar:" for="iptNumero"/>
                    <p:inputText id="iptNumero" size="10" label="Número" required="true"
                                 requiredMessage="Número é obrigatório!"
                                 value="#{andarController.andar.numero}"/>

                    <p:outputLabel value="Descrição:" for="iptNome"/>
                    <p:inputText id="iptNome" size="40" label="Nome" required="true"
                                 requiredMessage="Nome é obrigatório!"
                                 value="#{andarController.andar.nome}" maxlength="100"/>

                </h:panelGrid>
                <p:commandButton value="Salvar" icon="pi pi-save"
                                 action="#{andarController.adicionarAndar()}"
                                 update="@form, :frmList"
                                 oncomplete="PF('dlgCreateAndar').hide()"/>
            </h:form>
        </p:dialog>

        <!-- DIALOG: EDITAR ANDAR -->
        <p:dialog header="Editar Andar" widgetVar="dlgEditAndar" height="320" width="520"
                  showEffect="fade" modal="true">
            <h:form id="formEditAndar">
                <p:growl id="growlEdit" showDetail="true"/>
                <h:panelGrid columns="2" cellpadding="6"
                             rendered="#{andarController.selected != null}">

                    <p:outputLabel value="ID:" for="iptIdEdit"/>
                    <p:inputText id="iptIdEdit" size="10" disabled="true"
                                 value="#{andarController.selected.id}"/>

                    <p:outputLabel value="Número do Andar:" for="iptNumeroEdit"/>
                    <p:inputText id="iptNumeroEdit" size="10" label="Número" required="true"
                                 requiredMessage="Número é obrigatório!"
                                 value="#{andarController.selected.numero}"/>

                    <p:outputLabel value="Nome / Identificação:" for="iptNomeEdit"/>
                    <p:inputText id="iptNomeEdit" size="40" label="Nome" required="true"
                                 requiredMessage="Nome é obrigatório!"
                                 value="#{andarController.selected.nome}" maxlength="100"/>

                </h:panelGrid>
                <p:commandButton value="Salvar" icon="pi pi-save"
                                 action="#{andarController.editarAndar()}"
                                 update="@form, :frmList"
                                 oncomplete="PF('dlgEditAndar').hide()"/>
            </h:form>
        </p:dialog>

        <!-- DIALOG: VISUALIZAR ANDAR -->
        <p:dialog header="Detalhes do Andar" widgetVar="dlgViewAndar" height="250" width="450"
                  showEffect="fade" modal="true">
            <h:form id="formViewAndar">
                <h:panelGrid columns="2" cellpadding="6"
                             rendered="#{andarController.selected != null}">
                    <p:outputLabel value="ID:"/>
                    <p:outputLabel value="#{andarController.selected.id}"/>

                    <p:outputLabel value="Número:"/>
                    <p:outputLabel value="#{andarController.selected.numero}º Andar"/>

                    <p:outputLabel value="Nome:"/>
                    <p:outputLabel value="#{andarController.selected.nome}"/>
                </h:panelGrid>
            </h:form>
        </p:dialog>

    </ui:define>
</ui:composition>
